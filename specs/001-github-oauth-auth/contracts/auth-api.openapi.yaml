openapi: 3.0.3
info:
  title: DevPortfolio Auth API
  version: 1.0.0
  description: Contrato de autenticação GitHub OAuth para o módulo de login.
servers:
  - url: http://localhost:4000
paths:
  /api/auth/github/start:
    get:
      summary: Inicia fluxo OAuth no GitHub
      operationId: startGithubOAuth
      responses:
        '302':
          description: Redirect para autorização do GitHub
        '500':
          description: Falha ao iniciar autenticação
  /api/auth/github/callback:
    get:
      summary: Callback OAuth com code do GitHub
      operationId: githubOAuthCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect para dashboard após autenticação
        '400':
          description: Callback inválido (code/state ausente ou inválido)
        '401':
          description: Falha de autenticação no GitHub
        '500':
          description: Erro interno no processo de callback
  /api/auth/session:
    get:
      summary: Retorna sessão atual autenticada
      operationId: getCurrentSession
      responses:
        '200':
          description: Sessão válida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          description: Não autenticado
  /api/auth/logout:
    post:
      summary: Revoga sessão atual e encerra login
      operationId: logout
      responses:
        '204':
          description: Logout efetuado
        '401':
          description: Sessão já inválida ou ausente
components:
  schemas:
    UserProfile:
      type: object
      required:
        - githubId
        - username
      properties:
        githubId:
          type: string
        username:
          type: string
        displayName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        followers:
          type: integer
          minimum: 0
        publicRepos:
          type: integer
          minimum: 0
    SessionResponse:
      type: object
      required:
        - authenticated
      properties:
        authenticated:
          type: boolean
        user:
          allOf:
            - $ref: '#/components/schemas/UserProfile'
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
